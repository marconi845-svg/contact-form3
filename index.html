<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="color-scheme" content="dark">
  <title>Richiesta NStone</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0f0f13;
      --surface: #16161e;
      --surface-2: #1a1a24;
      --border: #2a2a35;
      --text: #e2e2e7;
      --text-muted: #8b8b9a;
      --accent: #7e3ff2;
      --accent-hover: #9461f5;
      --accent-glow: rgba(126, 63, 242, 0.25);
      --radius: 14px;
    }
    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }
    html, body {
      margin: 0;
      padding: 0;
      min-height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 16px;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }
    body {
      padding: 20px 16px 32px;
    }
    .wrap {
      max-width: 480px;
      margin: 0 auto;
    }
    .header {
      margin-bottom: 24px;
      text-align: center;
    }
    .logo {
      width: 56px;
      height: 56px;
      margin: 0 auto 14px;
      border: 2px solid #fff;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 18px;
      letter-spacing: -0.02em;
    }
    .header h1 {
      margin: 0 0 6px;
      font-size: 1.35rem;
      font-weight: 700;
      letter-spacing: -0.02em;
    }
    .header p {
      margin: 0;
      color: var(--text-muted);
      font-size: 0.9rem;
    }
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 20px 18px 22px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.35);
    }
    .field {
      margin-bottom: 18px;
    }
    .field label {
      display: block;
      margin-bottom: 8px;
      font-size: 0.8rem;
      font-weight: 600;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: var(--accent);
    }
    .field input,
    .field textarea {
      display: block;
      width: 100%;
      min-height: 52px;
      padding: 14px 16px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--surface-2);
      color: var(--text);
      font: inherit;
      font-size: 16px;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .field textarea {
      min-height: 140px;
      resize: vertical;
      line-height: 1.45;
    }
    .field input::placeholder,
    .field textarea::placeholder {
      color: #636370;
    }
    .field input:focus,
    .field textarea:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-glow);
    }
    .hint {
      margin-top: 6px;
      font-size: 0.78rem;
      color: var(--text-muted);
    }
    .submit {
      width: 100%;
      min-height: 54px;
      margin-top: 8px;
      padding: 14px 20px;
      border: none;
      border-radius: var(--radius);
      background: linear-gradient(135deg, #7e3ff2 0%, #5b21b6 100%);
      color: #fff;
      font: inherit;
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: 0.02em;
      cursor: pointer;
      box-shadow: 0 4px 20px var(--accent-glow);
      transition: transform 0.15s, opacity 0.15s;
    }
    .submit:active {
      transform: scale(0.98);
      opacity: 0.92;
    }
    .footer {
      margin-top: 20px;
      text-align: center;
      font-size: 0.75rem;
      color: var(--text-muted);
      line-height: 1.6;
    }
    .footer strong {
      color: #a78bfa;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <header class="header">
      <div class="logo">N+</div>
      <h1>Richiedi un preventivo</h1>
      <p>Compila i campi: il team NStone riceverà la tua richiesta.</p>
    </header>
    <div class="card">
      <form action="https://nonbaronial-wreathlike-trisha.ngrok-free.dev/api/form" method="POST">
        <div class="field">
          <label for="nome">Nome</label>
          <input
            id="nome"
            name="nome"
            type="text"
            placeholder="Es. Mario Rossi"
            autocomplete="name"
            required
          />
        </div>
        <div class="field">
          <label for="email">Email</label>
          <input
            id="email"
            name="email"
            type="email"
            placeholder="Es. mario@azienda.it"
            autocomplete="email"
            inputmode="email"
            required
          />
        </div>
        <div class="field">
          <label for="messaggio">Messaggio</label>
          <textarea
            id="messaggio"
            name="messaggio"
            placeholder="Es. Bianco Carrara CD, 2 cm lucidato, 5 mq"
            required
          ></textarea>
          <p class="hint">Indica materiale, spessore, finitura e quantità se possibile.</p>
        </div>
        <button type="submit" class="submit">Invia richiesta</button>
      </form>
    </div>
    <p class="footer">
      <strong>NStone</strong> · Richiesta sicura verso il gestionale<br>
      Developed by Nicolò Marconi
    </p>
  </div>
</body>
</html>
